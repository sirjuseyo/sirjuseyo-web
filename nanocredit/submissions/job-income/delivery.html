<!DOCTYPE html>
<html lang="ko">
<head>

  <title>배달직/퀵서비스 | nanocredit</title>
  <style>
    :root {
      --brand:     #380097;
      --nc-purple: #4432A2;
      --nc-btn:    #AFA9FD;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #fff;
      overflow-x: hidden;
    }

    /* ─── 페이지 타이틀 ─── */
    .page-title {
      font-size: 30px; font-weight: 900;
      color: #111; line-height: 1.3;
      letter-spacing: -1.2px;
    }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px;
      border: 1.5px solid #D1D5DB;
      border-radius: 8px;
      font-size: 13px; font-weight: 600;
      color: #555;
      text-decoration: none;
      background: #fff;
      cursor: pointer;
    }
    .back-btn:hover { background: #f5f5f5; }

    /* ─── 구분선 ─── */
    .thick-divider {
      height: 8px;
      background: #E0E0E0;
      margin: 0 0 36px;
    }

    /* ─── 푸터 ─── */
    footer {
      background: #fff;
      padding: 32px 20px 48px;
      border-top: 1px solid #E5E7EB;
    }
    .footer-logo {
      font-size: 18px; font-weight: 800;
      color: var(--nc-purple);
      margin-bottom: 12px;
    }
    .footer-info {
      font-size: 12px;
      color: #888;
      line-height: 1.8;
    }
  </style>
</head>
<body>

<!-- Page title section with BACK -->
<div style="padding: 40px 24px 28px;">

</html>
