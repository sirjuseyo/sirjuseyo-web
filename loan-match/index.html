<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>나에게 맞는 대출 상품 | 써주세요.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand:     #380097;
      --nc-purple: #4432A2;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #fff;
      overflow-x: hidden;
    }

    /* ─── 페이지 타이틀 섹션 ─── */
    .page-title-section {
      padding: 40px 24px 28px;
      background: #fff;
    }
    .page-title {
      font-size: 30px; font-weight: 900;
      color: #111; line-height: 1.3;
      letter-spacing: -1.2px;
    }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px;
      border: 1.5px solid #D1D5DB;
      border-radius: 8px;
      font-size: 13px; font-weight: 600;
      color: #555;
      text-decoration: none;
      background: #fff;
      cursor: pointer;
    }
    .back-btn:hover { background: #f5f5f5; }

    /* ─── 캐릭터 이미지 ─── */
    .character-section {
      padding: 0;
    }
    .character-section img {
      width: 100%;
      display: block;
    }

    /* ─── 서브 텍스트 ─── */
    .sub-text {
      padding: 0 24px 48px;
      text-align: center;
      font-size: 14px;
      color: #888;
      line-height: 1.6;
    }

    /* ─── CTA 블록 ─── */
    .cta-block {
      padding: 0 24px 24px;
    }
    .cta-block.second {
      padding-bottom: 40px;
    }
    .cta-label {
      font-size: 17px;
      font-weight: 700;
      color: #222;
      margin-bottom: 12px;
    }

    /* ─── 초록 버튼 ─── */
    .btn-green {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 70px;
      border: none;
      border-radius: 10px;
      font-size: 23px;
      font-weight: bold;
      text-decoration: none;
      color: #fff;
      background-color: #5BCB50;
      border-bottom: 4px solid #45A63E;
      transition: 200ms;
    }
    .btn-green:hover {
      background-color: #45A63E;
    }

    /* ─── 회색 버튼 ─── */
    .btn-gray {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 70px;
      border: none;
      border-radius: 10px;
      font-size: 23px;
      font-weight: bold;
      text-decoration: none;
      color: #000;
      background-color: #EBEEF3;
      border-bottom: 4px solid #C5C9D0;
      transition: 200ms;
    }
    .btn-gray:hover {
      background-color: #D6DAE3;
    }

    /* ─── 하단 BACK ─── */
    .bottom-back {
      padding: 28px 24px;
      background: #fff;
    }

    /* ─── FOOTER ─── */
    footer {
      background: #fff;
      padding: 32px 20px 48px;
      border-top: 1px solid #E5E7EB;
    }
    .footer-logo {
      font-size: 18px; font-weight: 800;
      color: var(--nc-purple);
      margin-bottom: 12px;
    }
    .footer-info {
      font-size: 12px; color: #888;
      line-height: 1.8;
    }
  </style>
</head>
<body>

<!-- ─── SEC-01 상단 BACK ─── -->
<div class="page-title-section">
  <a class="back-btn" href="../index.html">⬅ BACK</a>
</div>

<!-- ─── SEC-02 페이지 타이틀 ─── -->
<div style="padding: 0 24px 32px;">
  <h1 class="page-title">어떻게 돈을 빌릴지부터 확인해요!</h1>
</div>

<!-- ─── SEC-03 캐릭터 이미지 ─── -->
<div class="character-section">
  <img src="../imgs/loan-match/짤-001.png" alt="내가 돈 빌려줄거라고 확신해?! - 써주세요 캐릭터" />
</div>

<!-- ─── SEC-04 서브 텍스트 ─── -->
<div class="sub-text">
  AI 기술로 나만의 신용점수를 만들어요!
</div>

<!-- ─── SEC-05 CTA 블록 1 — 즉시 빌리기 ─── -->
<div class="cta-block">
  <p class="cta-label">🪙 포인트를 적립하고</p>
  <a class="btn-green" href="../nanocredit/index.html">⚡ 즉시 빌리기</a>
</div>

<!-- ─── SEC-06 CTA 블록 2 — 여유있게 빌리기 ─── -->
<div class="cta-block second">
  <p class="cta-label">⏭️ 포인트를 적립 안하고</p>
  <a class="btn-gray" href="browse.html">🍵 여유있게 빌리기</a>
</div>

<!-- ─── SEC-07 하단 BACK ─── -->
<div class="bottom-back">
  <a class="back-btn" href="../index.html">⬅ BACK</a>
</div>

<!-- ─── FOOTER (공용 footer.js) ─── -->
<script src="/footer.js"></script>

</body>
</html>
